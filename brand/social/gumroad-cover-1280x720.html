<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .cover {
    width: 1280px; height: 720px;
    background: #0A0A0A;
    position: relative;
    overflow: hidden;
    font-family: Inter, -apple-system, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
  }
  /* Subtle grid */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,158,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,158,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Glow accent */
  .cover::after {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(74,158,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #4A9EFF;
    text-transform: uppercase;
    margin-bottom: 30px;
    position: relative;
    z-index: 1;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    color: #F5F5F5;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }
  h1 span { color: #4A9EFF; }
  .sub {
    font-size: 22px;
    color: #888;
    line-height: 1.5;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }
  .items {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .item {
    font-size: 14px;
    font-weight: 500;
    color: #C0C0C0;
    padding: 8px 18px;
    border: 1px solid #333;
    border-radius: 6px;
    background: rgba(255,255,255,0.03);
  }
  .price-tag {
    position: absolute;
    bottom: 60px;
    right: 100px;
    text-align: right;
    z-index: 1;
  }
  .price-tag .old { font-size: 20px; color: #555; text-decoration: line-through; }
  .price-tag .now { font-size: 56px; font-weight: 800; color: #F5F5F5; }
  .price-tag .label { font-size: 14px; color: #4A9EFF; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .brand {
    position: absolute;
    top: 40px;
    right: 60px;
    font-size: 18px;
    font-weight: 800;
    color: #F5F5F5;
    letter-spacing: -0.5px;
    z-index: 1;
  }
  .brand span { color: #555; }
</style>
</head>
<body>
<div class="cover">
  <div class="brand">Saleverse<span>HQ</span></div>
  <div class="badge">Digital Product</div>
  <h1>The GTM<br><span>Starter Kit</span></h1>
  <p class="sub">Everything you need to launch B2B cold outbound from zero. No fluff — just the system.</p>
  <div class="items">
    <div class="item">Outbound Playbook</div>
    <div class="item">Email Sequences</div>
    <div class="item">ICP Framework</div>
    <div class="item">Pipeline CRM</div>
    <div class="item">Subject Lines</div>
  </div>
  <div class="price-tag">
    <div class="label">Launch Price</div>
    <div class="old">£79</div>
    <div class="now">£49</div>
  </div>
</div>
</body>
</html>
