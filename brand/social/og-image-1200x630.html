<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; }
.og {
    width: 1200px; height: 630px;
    background: #0a0a0a;
    display: flex; align-items: center;
    padding: 0 80px;
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
}
.og::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
}
.content { z-index: 1; flex: 1; }
.label {
    font-size: 13px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: #555; margin-bottom: 20px;
}
h1 {
    font-size: 56px; font-weight: 800; color: #f0f0f0;
    letter-spacing: -2px; line-height: 1.1; margin-bottom: 16px;
}
h1 em { font-style: normal; color: #888; }
.desc {
    font-size: 18px; color: #666; line-height: 1.6;
    max-width: 500px;
}
.url {
    position: absolute; bottom: 40px; left: 80px;
    font-size: 14px; color: #444; font-weight: 500;
    letter-spacing: 1px;
}
.icon-area {
    z-index: 1; opacity: 0.12;
    margin-left: 40px;
}
.line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #333, #888, #333, transparent);
}
</style>
</head>
<body>
<div class="og">
    <div class="content">
        <div class="label">SALESVERSEHQ</div>
        <h1>GTM systems for founders <em>who sell.</em></h1>
        <p class="desc">Outbound playbooks, email sequences, CRM templates, and done-for-you pipeline builds. Built by operators.</p>
    </div>
    <div class="icon-area">
        <svg viewBox="0 0 512 512" fill="none" width="360" height="360">
            <path d="M320 140 C320 110, 290 85, 256 85 C210 85, 175 115, 175 155 C175 195, 205 215, 256 235 C307 255, 337 275, 337 315 C337 355, 302 385, 256 385 C222 385, 192 360, 192 330"
                  stroke="#C0C0C0" stroke-width="36" stroke-linecap="round"/>
            <line x1="310" y1="130" x2="380" y2="100" stroke="#C0C0C0" stroke-width="3"/>
            <circle cx="380" cy="100" r="6" fill="#E0E0E0"/>
            <line x1="320" y1="115" x2="400" y2="80" stroke="#C0C0C0" stroke-width="2.5"/>
            <circle cx="400" cy="80" r="5" fill="#C0C0C0"/>
            <line x1="330" y1="145" x2="395" y2="130" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="395" cy="130" r="4" fill="#C0C0C0"/>
            <line x1="202" y1="340" x2="132" y2="370" stroke="#C0C0C0" stroke-width="3"/>
            <circle cx="132" cy="370" r="6" fill="#E0E0E0"/>
            <line x1="192" y1="355" x2="112" y2="390" stroke="#C0C0C0" stroke-width="2.5"/>
            <circle cx="112" cy="390" r="5" fill="#C0C0C0"/>
            <line x1="182" y1="325" x2="117" y2="340" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="117" cy="340" r="4" fill="#C0C0C0"/>
        </svg>
    </div>
    <div class="url">salesversehq.com</div>
    <div class="line"></div>
</div>
</body></html>
