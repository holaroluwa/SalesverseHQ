<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1500px; height: 500px; overflow: hidden; }
.banner {
    width: 1500px; height: 500px;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 80px;
    font-family: 'Inter', sans-serif;
    position: relative;
    overflow: hidden;
}
/* Subtle grid pattern */
.banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
}
.left { z-index: 1; }
.brand-name {
    font-size: 72px; font-weight: 800; letter-spacing: -3px;
    color: #f0f0f0;
}
.brand-name span { color: #666; }
.tagline {
    font-size: 18px; font-weight: 500; color: #555;
    margin-top: 8px; letter-spacing: 0.5px;
}
.pillars {
    display: flex; gap: 24px; margin-top: 24px;
}
.pillar {
    font-size: 13px; font-weight: 600; color: #888;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid #222;
    border-radius: 6px;
}
/* Circuit S mark - right side */
.right { z-index: 1; opacity: 0.15; }
.right svg { width: 400px; height: 400px; }
/* Gradient line */
.line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #333, #666, #999, #666, #333, transparent);
}
</style>
</head>
<body>
<div class="banner">
    <div class="left">
        <div class="brand-name">Saleverse<span>HQ</span></div>
        <div class="tagline">The unglamorous truth about B2B sales.</div>
        <div class="pillars">
            <div class="pillar">Sales</div>
            <div class="pillar">Tech</div>
            <div class="pillar">AI</div>
        </div>
    </div>
    <div class="right">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M320 140 C320 110, 290 85, 256 85 C210 85, 175 115, 175 155 C175 195, 205 215, 256 235 C307 255, 337 275, 337 315 C337 355, 302 385, 256 385 C222 385, 192 360, 192 330"
                  stroke="#C0C0C0" stroke-width="36" stroke-linecap="round"/>
            <line x1="310" y1="130" x2="380" y2="100" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="380" cy="100" r="5" fill="#E0E0E0"/>
            <line x1="320" y1="115" x2="400" y2="80" stroke="#C0C0C0" stroke-width="2" stroke-linecap="round"/>
            <circle cx="400" cy="80" r="4" fill="#C0C0C0"/>
            <line x1="330" y1="145" x2="395" y2="130" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="395" cy="130" r="4" fill="#C0C0C0"/>
            <line x1="202" y1="340" x2="132" y2="370" stroke="#C0C0C0" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="132" cy="370" r="5" fill="#E0E0E0"/>
            <line x1="192" y1="355" x2="112" y2="390" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="112" cy="390" r="4" fill="#C0C0C0"/>
            <line x1="182" y1="325" x2="117" y2="340" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="117" cy="340" r="4" fill="#C0C0C0"/>
        </svg>
    </div>
    <div class="line"></div>
</div>
</body></html>
