<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline CRM — GTM Starter Kit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface-2: #1a1a1a;
            --border: #222;
            --text: #f5f5f5;
            --muted: #888;
            --accent: #ff6b2b;
            --green: #22c55e;
            --yellow: #eab308;
            --blue: #3b82f6;
            --red: #ef4444;
            --purple: #8b5cf6;
        }
        body { font-family: -apple-system, 'Inter', sans-serif; background: var(--bg); color: var(--text); }

        /* Header */
        header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(10px);
            z-index: 50;
        }
        header h1 { font-size: 18px; font-weight: 700; }
        header h1 span { color: var(--accent); }
        .header-actions { display: flex; gap: 12px; align-items: center; }
        .header-stats { display: flex; gap: 20px; margin-right: 20px; }
        .stat { text-align: center; }
        .stat-num { font-size: 20px; font-weight: 800; }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-add {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-add:hover { opacity: 0.9; }

        /* Filter Bar */
        .filters {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .filter-btn.active { border-color: var(--accent); color: var(--accent); }
        .search-input {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            width: 200px;
            outline: none;
        }
        .search-input:focus { border-color: var(--accent); }

        /* Table */
        .table-wrap { overflow-x: auto; padding: 0 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th {
            text-align: left;
            padding: 10px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 65px;
            background: var(--bg);
        }
        td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:hover td { background: var(--surface); }

        .company-name { font-weight: 600; }
        .company-url { font-size: 12px; color: var(--muted); }

        /* Stage badges */
        .stage {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }
        .stage-prospect { background: rgba(139,92,246,0.15); color: var(--purple); }
        .stage-contacted { background: rgba(59,130,246,0.15); color: var(--blue); }
        .stage-replied { background: rgba(234,179,8,0.15); color: var(--yellow); }
        .stage-meeting { background: rgba(34,197,94,0.15); color: var(--green); }
        .stage-closed { background: rgba(34,197,94,0.25); color: var(--green); }
        .stage-lost { background: rgba(239,68,68,0.15); color: var(--red); }
        .stage-dormant { background: rgba(136,136,136,0.15); color: var(--muted); }

        /* Tier */
        .tier { font-weight: 700; font-size: 13px; }
        .tier-1 { color: var(--red); }
        .tier-2 { color: var(--yellow); }
        .tier-3 { color: var(--green); }

        /* Touch tracker */
        .touches { display: flex; gap: 4px; }
        .touch {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .touch-pending { background: var(--surface-2); border: 1px solid var(--border); color: var(--muted); }
        .touch-sent { background: rgba(34,197,94,0.2); border: 1px solid var(--green); color: var(--green); }

        /* Actions */
        .actions { display: flex; gap: 6px; }
        .action-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .action-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h2 { font-size: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn-save {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }
        .btn-cancel {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--muted);
        }
        .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; margin-bottom: 24px; }

        /* Footer */
        footer {
            padding: 20px 24px;
            text-align: center;
            font-size: 12px;
            color: #444;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Pipeline <span>CRM</span></h1>
    <div class="header-actions">
        <div class="header-stats">
            <div class="stat">
                <div class="stat-num" id="total-count">0</div>
                <div class="stat-label">Accounts</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="contacted-count">0</div>
                <div class="stat-label">Contacted</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="meeting-count">0</div>
                <div class="stat-label">Meetings</div>
            </div>
        </div>
        <button class="btn-add" onclick="openModal()">+ Add Account</button>
        <button class="action-btn" onclick="exportCSV()" title="Export CSV">↓</button>
    </div>
</header>

<div class="filters">
    <button class="filter-btn active" onclick="filterStage('all', this)">All</button>
    <button class="filter-btn" onclick="filterStage('Prospect', this)">Prospect</button>
    <button class="filter-btn" onclick="filterStage('Contacted', this)">Contacted</button>
    <button class="filter-btn" onclick="filterStage('Replied', this)">Replied</button>
    <button class="filter-btn" onclick="filterStage('Meeting', this)">Meeting</button>
    <button class="filter-btn" onclick="filterStage('Closed', this)">Closed</button>
    <button class="filter-btn" onclick="filterStage('Lost', this)">Lost</button>
    <input type="text" class="search-input" placeholder="Search companies..." oninput="searchAccounts(this.value)">
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Company</th>
                <th>Tier</th>
                <th>Contact</th>
                <th>Title</th>
                <th>Stage</th>
                <th>Touches</th>
                <th>Notes</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="accounts-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">
        <h3>No accounts yet</h3>
        <p>Click "+ Add Account" to start building your pipeline.</p>
        <button class="btn-add" onclick="openModal()">+ Add First Account</button>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="modal-title">Add Account</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Company Name *</label>
            <input type="text" id="f-company" placeholder="Acme Corp">
        </div>
        <div class="form-group">
            <label>Website</label>
            <input type="text" id="f-website" placeholder="acme.com">
        </div>
        <div class="form-group">
            <label>Tier</label>
            <select id="f-tier">
                <option value="1">Tier 1 — High Priority</option>
                <option value="2">Tier 2 — Medium Priority</option>
                <option value="3">Tier 3 — Low Priority</option>
            </select>
        </div>
        <div class="form-group">
            <label>Contact Name</label>
            <input type="text" id="f-contact" placeholder="Jane Smith">
        </div>
        <div class="form-group">
            <label>Contact Title</label>
            <input type="text" id="f-title" placeholder="Head of Sales">
        </div>
        <div class="form-group">
            <label>Contact Email</label>
            <input type="email" id="f-email" placeholder="jane@acme.com">
        </div>
        <div class="form-group">
            <label>LinkedIn URL</label>
            <input type="text" id="f-linkedin" placeholder="linkedin.com/in/janesmith">
        </div>
        <div class="form-group">
            <label>Stage</label>
            <select id="f-stage">
                <option value="Prospect">Prospect</option>
                <option value="Contacted">Contacted</option>
                <option value="Replied">Replied</option>
                <option value="Meeting">Meeting Booked</option>
                <option value="Closed">Closed Won</option>
                <option value="Lost">Closed Lost</option>
                <option value="Dormant">Dormant</option>
            </select>
        </div>
        <div class="form-group">
            <label>Notes</label>
            <textarea id="f-notes" placeholder="Pain signals, personalisation angle, key info..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveAccount()">Save Account</button>
        </div>
    </div>
</div>

<footer>
    Pipeline CRM — GTM Starter Kit by SalesverseHQ · Data saved in your browser (localStorage)
</footer>

<script>
    // Data
    let accounts = JSON.parse(localStorage.getItem('pipeline-crm-accounts') || '[]');
    let currentFilter = 'all';
    let searchQuery = '';

    function save() {
        localStorage.setItem('pipeline-crm-accounts', JSON.stringify(accounts));
        render();
    }

    function render() {
        const tbody = document.getElementById('accounts-body');
        const empty = document.getElementById('empty-state');

        let filtered = accounts.filter(a => {
            if (currentFilter !== 'all' && a.stage !== currentFilter) return false;
            if (searchQuery && !a.company.toLowerCase().includes(searchQuery.toLowerCase()) &&
                !a.contact.toLowerCase().includes(searchQuery.toLowerCase())) return false;
            return true;
        });

        // Sort: Tier 1 first, then by stage priority
        const stagePriority = { 'Meeting': 0, 'Replied': 1, 'Contacted': 2, 'Prospect': 3, 'Closed': 4, 'Lost': 5, 'Dormant': 6 };
        filtered.sort((a, b) => (a.tier - b.tier) || ((stagePriority[a.stage] || 9) - (stagePriority[b.stage] || 9)));

        if (accounts.length === 0) {
            empty.style.display = 'block';
            tbody.innerHTML = '';
        } else {
            empty.style.display = 'none';
            tbody.innerHTML = filtered.map(a => `
                <tr data-id="${a.id}">
                    <td>
                        <div class="company-name">${esc(a.company)}</div>
                        ${a.website ? `<div class="company-url">${esc(a.website)}</div>` : ''}
                    </td>
                    <td><span class="tier tier-${a.tier}">T${a.tier}</span></td>
                    <td>${esc(a.contact)}</td>
                    <td style="font-size:13px;color:var(--muted)">${esc(a.title)}</td>
                    <td><span class="stage stage-${a.stage.toLowerCase()}">${a.stage}</span></td>
                    <td>
                        <div class="touches">
                            ${[1,2,3,4,5].map(t => `
                                <div class="touch ${a.touches && a.touches[t] ? 'touch-sent' : 'touch-pending'}"
                                     onclick="toggleTouch('${a.id}', ${t})" title="Touch ${t}">
                                    ${t}
                                </div>
                            `).join('')}
                        </div>
                    </td>
                    <td style="font-size:12px;color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.notes || '')}</td>
                    <td>
                        <div class="actions">
                            <button class="action-btn" onclick="editAccount('${a.id}')" title="Edit">✎</button>
                            <button class="action-btn" onclick="deleteAccount('${a.id}')" title="Delete">×</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Stats
        document.getElementById('total-count').textContent = accounts.length;
        document.getElementById('contacted-count').textContent = accounts.filter(a => a.stage !== 'Prospect').length;
        document.getElementById('meeting-count').textContent = accounts.filter(a => a.stage === 'Meeting' || a.stage === 'Closed').length;
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function openModal(id) {
        document.getElementById('modal-overlay').classList.add('active');
        if (id) {
            const a = accounts.find(x => x.id === id);
            if (!a) return;
            document.getElementById('modal-title').textContent = 'Edit Account';
            document.getElementById('edit-id').value = id;
            document.getElementById('f-company').value = a.company;
            document.getElementById('f-website').value = a.website || '';
            document.getElementById('f-tier').value = a.tier;
            document.getElementById('f-contact').value = a.contact;
            document.getElementById('f-title').value = a.title || '';
            document.getElementById('f-email').value = a.email || '';
            document.getElementById('f-linkedin').value = a.linkedin || '';
            document.getElementById('f-stage').value = a.stage;
            document.getElementById('f-notes').value = a.notes || '';
        } else {
            document.getElementById('modal-title').textContent = 'Add Account';
            document.getElementById('edit-id').value = '';
            ['f-company','f-website','f-contact','f-title','f-email','f-linkedin','f-notes'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('f-tier').value = '1';
            document.getElementById('f-stage').value = 'Prospect';
        }
    }

    function closeModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('modal-overlay').classList.remove('active');
    }

    function saveAccount() {
        const company = document.getElementById('f-company').value.trim();
        if (!company) return alert('Company name is required');

        const editId = document.getElementById('edit-id').value;
        const data = {
            company,
            website: document.getElementById('f-website').value.trim(),
            tier: parseInt(document.getElementById('f-tier').value),
            contact: document.getElementById('f-contact').value.trim(),
            title: document.getElementById('f-title').value.trim(),
            email: document.getElementById('f-email').value.trim(),
            linkedin: document.getElementById('f-linkedin').value.trim(),
            stage: document.getElementById('f-stage').value,
            notes: document.getElementById('f-notes').value.trim(),
        };

        if (editId) {
            const idx = accounts.findIndex(a => a.id === editId);
            if (idx >= 0) accounts[idx] = { ...accounts[idx], ...data };
        } else {
            data.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            data.touches = {};
            data.created = new Date().toISOString();
            accounts.push(data);
        }

        save();
        closeModal();
    }

    function editAccount(id) { openModal(id); }

    function deleteAccount(id) {
        if (!confirm('Delete this account?')) return;
        accounts = accounts.filter(a => a.id !== id);
        save();
    }

    function toggleTouch(id, t) {
        const a = accounts.find(x => x.id === id);
        if (!a) return;
        if (!a.touches) a.touches = {};
        a.touches[t] = !a.touches[t];
        // Auto-update stage
        if (a.touches[1] && a.stage === 'Prospect') a.stage = 'Contacted';
        save();
    }

    function filterStage(stage, btn) {
        currentFilter = stage;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function searchAccounts(q) { searchQuery = q; render(); }

    function exportCSV() {
        const headers = ['Company','Website','Tier','Contact','Title','Email','LinkedIn','Stage','T1','T2','T3','T4','T5','Notes'];
        const rows = accounts.map(a => [
            a.company, a.website, a.tier, a.contact, a.title, a.email, a.linkedin, a.stage,
            a.touches?.[1] ? 'Sent' : '', a.touches?.[2] ? 'Sent' : '', a.touches?.[3] ? 'Sent' : '',
            a.touches?.[4] ? 'Sent' : '', a.touches?.[5] ? 'Sent' : '', a.notes
        ]);
        const csv = [headers, ...rows].map(r => r.map(c => `"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'pipeline-export.csv';
        a.click();
    }

    // Init
    render();
</script>

</body>
</html>
